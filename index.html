<html>
<head>
  <title>Meron na ba ako?</title>
  <style>
    body {
      background-color: white;
      font-family: "Arial", sans-serif;
      margin: 0;
      overflow: hidden; 
    }
    h1 {
      font-size: 5em;
      margin: 0;
      text-align: center;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
      display: none; 
      cursor: pointer;
      user-select: none;
      z-index: 1; 
    }
    #secret-image-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url("https://i.pinimg.com/474x/be/30/b1/be30b14a02463877471e0a6030e8e9f2.jpg");
      background-size: 75%;
      background-repeat: no-repeat;
      background-position: center;
      z-index: 9999;
      display: none;
    }
  </style>
</head>
<body>

  <h1 id="main-text" onclick="handleInteraction()">Wala pa po, sorry. ✌️</h1>
  
  <div id="secret-image-container"></div>

  <script>
    alert("Meron na ba ako? Ang sabi ng survey ay...");
    
    const textElement = document.getElementById("main-text");
    const secretImgContainer = document.getElementById("secret-image-container");
    
    textElement.style.display = "block";

    let isUnlocked = false; 
    let clickCount = 0;     

    function handleInteraction() {
      if (!isUnlocked) {
        let userInput = prompt("Enter Name, Your Name, Their Name, Bahala kana HAHAHAHAH:");
        
        if (userInput === null) return;

        if (userInput.toLowerCase() === "dianne") {
          alert("You know what, dae mo dapat na araman yan HEHEHEHEHEH 😅😆");
          isUnlocked = true; 
        } else {
          alert("Invalid Name HAHAHAHAH");
          textElement.onclick = null;
          textElement.style.cursor = "default";
        }
      } 
      else {
        clickCount++;
        
        if (clickCount >= 2) {
          secretImgContainer.style.display = "block";
          textElement.style.display = "none";
          textElement.onclick = null; 
        }
      }
    }
  </script>

</body>
</html>
